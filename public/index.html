<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Service Project</title>
  </head>
  <body>
    <main>
      <h1>Campus Service Request and Maintenance System</h1>
      <p>Initial Cloudflare setup is ready.</p>
      <button id="button" type="button">Check API</button>
      <output id="status" for="button"></output>
    </main>
    <script>
      const button = document.getElementById("button");
      button.addEventListener("click", async () => {
        const response = await fetch("/api/health");
        const result = await response.json();
        document.getElementById("status").textContent = result.status;
      });
    </script>
  </body>
</html>
